<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аниме — FandomHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="cat-anime">

<header class="header">
  <a href="index.html" class="brand"><span>Fandom<b>Hub</b></span></a>
  <a href="index.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Главная
  </a>
</header>

<main class="page">
  <div class="cat-head">
    <div>
      <span class="cat-label"><span class="cat-dot"></span>Аниме</span>
      <h1>Каталог фандомов</h1>
      <p>Топ аниме с MyAnimeList · поиск в реальном времени</p>
    </div>
    <a href="index.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      На главную
    </a>
  </div>

  <div class="search-wrap">
    <img src="icons/icon-search.svg" alt="">
    <input type="text" id="search" placeholder="Поиск аниме…" autocomplete="off">
  </div>

  <div class="cards-grid" id="grid">
  </div>
  <p class="no-results" id="no-results">Ничего не найдено</p>
</main>

<script>
  // Базовый URL Jikan — бесплатного неофициального API MyAnimeList (ключ не нужен)
  const JIKAN = 'https://api.jikan.moe/v4';

  // Ссылки на DOM-элементы, с которыми работаем
  const grid  = document.getElementById('grid');       // сетка карточек
  const noRes = document.getElementById('no-results'); // надпись «ничего не найдено»
  const inp   = document.getElementById('search');     // поле поиска

  // Таймер дебаунса — нужен, чтобы не слать запрос на каждую набранную букву
  let searchTimer;

  // Форматирует большое число в читаемый вид: 1 500 000 → "1.5M", 287 000 → "287K"
  function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return Math.round(n / 1_000) + 'K';
    return n;
  }

  // Экранирует спецсимволы HTML, чтобы данные из API не сломали вёрстку
  // Пример: символ < превращается в &lt; и браузер показывает его как текст, а не тег
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Принимает массив объектов аниме из API и отрисовывает карточки в сетке.
  // Если массив пустой — прячет сетку и показывает надпись «ничего не найдено».
  function renderCards(items) {
    noRes.style.display = 'none';
    if (!items.length) {
      grid.innerHTML = '';
      noRes.style.display = '';
      return;
    }
    grid.innerHTML = items.map(a => {
      // Берём английское название; если его нет — используем оригинальное (ромадзи)
      const title   = esc(a.title_english || a.title);
      // Предпочитаем большой постер, если доступен
      const image   = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
      // Берём первые два жанра и соединяем через точку с пробелом
      const genres  = (a.genres || []).slice(0, 2).map(g => g.name).join(' · ') || '—';
      const members = a.members ? fmt(a.members) + ' участников' : '—';
      const score   = a.score ? '★ ' + a.score.toFixed(1) : '';
      // Прямая ссылка на страницу аниме на MyAnimeList
      const url     = a.url || '#';
      return `
        <a href="${url}" target="_blank" rel="noopener" class="fandom-card">
          <div class="card-poster"><img src="${image}" alt="${title}" loading="lazy"></div>
          <div class="card-body">
            <div class="card-name" title="${title}">${title}</div>
            <div class="card-genre">${esc(genres)}</div>
            <div class="card-footer">
              <span class="card-members">${members}</span>
              <span class="join-btn">${score}</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  // Заменяет содержимое сетки анимацией загрузки (CSS-спиннер)
  function showSpinner() {
    grid.innerHTML = '<div class="grid-spinner"></div>';
    noRes.style.display = 'none';
  }

  // Показывает текстовое сообщение об ошибке внутри сетки
  function showError(msg) {
    grid.innerHTML = `<p class="grid-message">${msg}</p>`;
  }

  // Основная функция загрузки данных.
  // Если передана строка query — ищет аниме по названию.
  // Если query пустой — загружает топ сериалов (type=tv).
  async function load(query) {
    showSpinner();
    try {
      const url = query
        ? `${JIKAN}/anime?q=${encodeURIComponent(query)}&limit=24&sfw=true&order_by=popularity`
        : `${JIKAN}/top/anime?type=tv&limit=24`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(res.status); // если сервер вернул ошибку — идём в catch
      const json = await res.json();
      renderCards(json.data || []); // у Jikan результаты лежат в поле data
    } catch (e) {
      showError('Не удалось загрузить данные. Попробуй позже.');
    }
  }

  // Слушаем ввод в поле поиска.
  // Сбрасываем предыдущий таймер и ставим новый на 500 мс —
  // это дебаунс: запрос уйдёт только когда пользователь перестанет печатать.
  inp.addEventListener('input', function () {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    searchTimer = setTimeout(() => load(q), 500);
  });

  // Сразу при открытии страницы загружаем топ аниме
  load();
</script>
</body>
</html>
