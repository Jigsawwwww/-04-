<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Книги — FandomHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="cat-books">

<header class="header">
  <a href="index.html" class="brand"><span>Fandom<b>Hub</b></span></a>
  <a href="index.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Главная
  </a>
</header>

<main class="page">
  <div class="cat-head">
    <div>
      <span class="cat-label"><span class="cat-dot"></span>Книги</span>
      <h1>Каталог фандомов</h1>
      <p>Популярные книги с Google Books · поиск в реальном времени</p>
    </div>
    <a href="index.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      На главную
    </a>
  </div>

  <div class="search-wrap">
    <img src="icons/icon-search.svg" alt="">
    <input type="text" id="search" placeholder="Поиск книги…" autocomplete="off">
  </div>

  <div class="cards-grid" id="grid">`n  </div>`n  <p class="no-results" id="no-results">Ничего не найдено</p>
</main>

<script>
  // Open Library API — полностью бесплатно, ключ не нужен, стабильный CORS
  const OL   = 'https://openlibrary.org';
  // Базовый URL для обложек книг; в конце добавляем ID и размер (-S/-M/-L)
  const OLCO = 'https://covers.openlibrary.org/b/id';

  const grid  = document.getElementById('grid');       // сетка карточек
  const noRes = document.getElementById('no-results'); // надпись «ничего не найдено»
  const inp   = document.getElementById('search');     // поле поиска
  let searchTimer;

  // Форматирует большое число: 1 200 000 → "1.2M", 98 000 → "98K"
  function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return Math.round(n / 1_000) + 'K';
    return n;
  }

  // Экранирует спецсимволы HTML
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Принимает массив книг из Open Library (поле docs) и строит карточки.
  // Если список пустой — показывает «ничего не найдено».
  function renderCards(docs) {
    noRes.style.display = 'none';
    if (!docs.length) { grid.innerHTML = ''; noRes.style.display = ''; return; }
    grid.innerHTML = docs.map(b => {
      const title  = esc(b.title || '—');
      // author_name — массив, берём первого автора
      const author = esc((b.author_name || [])[0] || '—');
      // cover_i — числовой ID обложки; -M = medium (~180px ширина), достаточно для карточки
      const image  = b.cover_i ? `${OLCO}/${b.cover_i}-M.jpg` : '';
      const year   = b.first_publish_year || '';
      const score  = b.ratings_average ? '★ ' + (+b.ratings_average * 2).toFixed(1) : '';
      const votes  = fmt(b.ratings_count || 0);
      // key формат: "/works/OL45883W" — добавляем к базовому URL
      const url    = b.key ? OL + b.key : '#';
      return `
        <a href="${url}" target="_blank" rel="noopener" class="fandom-card">
          <div class="card-poster"><img src="${image}" alt="${title}" loading="lazy"></div>
          <div class="card-body">
            <div class="card-name" title="${title}">${title}</div>
            <div class="card-genre">${author}${year ? ' · ' + year : ''}</div>
            <div class="card-footer">
              <span class="card-members">${votes} оценок</span>
              <span class="join-btn">${score}</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  // Показывает CSS-спиннер пока идёт загрузка
  function showSpinner() {
    grid.innerHTML = '<div class="grid-spinner"></div>';
    noRes.style.display = 'none';
  }

  // Загружает данные из Open Library.
  // Без запроса — топ художественной литературы, отсортированный по рейтингу.
  // С запросом — полнотекстовый поиск по названию/автору на любом языке.
  // fields= ограничивает ответ только нужными полями, ускоряя загрузку.
  async function load(query) {
    showSpinner();
    try {
      const fields = 'key,title,author_name,cover_i,first_publish_year,ratings_average,ratings_count';
      const url = query
        ? `${OL}/search.json?q=${encodeURIComponent(query)}&limit=24&fields=${fields}`
        : `${OL}/search.json?subject=fiction&sort=rating&limit=24&fields=${fields}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      renderCards((await res.json()).docs || []);
    } catch (e) {
      grid.innerHTML = '<p class="grid-message">Не удалось загрузить данные. Попробуй позже.</p>';
    }
  }

  // Дебаунс 500 мс: запрос уходит только после паузы в наборе текста
  inp.addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => load(this.value.trim()), 500);
  });

  // Загружаем топ книг при открытии страницы
  load();
</script>
</body>
</html>
